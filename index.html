<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <form id="game-form">

        <div class="container">
            <h1 class="title">Tic Tac Toe</h1>

            <!-- <div class="status">Player <span class="current-player">X</span>'s Turn</div> -->

            <div class="board">
                <div class="cell" id="0"></div>
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
            </div>

            <div id="result-message">
                <span id='result' class="result-text"></span>
            </div>

            <button class="reset-btn" id='rst' type="reset">Restart Game</button>

            <div class="scoreboard">
                <div class="score-card">
                    <span class="score-label">Player X</span>
                    <span class="score-value" id="score-x">0</span>
                </div>
                <div class="score-card draw">
                    <span class="score-label">Draws</span>
                    <span class="score-value" id="score-draw">0</span>
                </div>
                <div class="score-card">
                    <span class="score-label">Player O</span>
                    <span class="score-value" id="score-o">0</span>
                </div>
            </div>
        </div>
    </form>
    <script src="tick.js"></script>
</body>

</html>
